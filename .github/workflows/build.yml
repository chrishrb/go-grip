name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: mise run build

      - name: Run tests
        run: mise run test

      - name: Format
        run: |
          DIFF="$(gofmt -d .)"
          if [[ -n $DIFF ]]; then
            echo "$DIFF"
            echo "please run gofmt"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          install-mode: none
